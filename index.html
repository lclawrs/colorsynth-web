<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ColorSynth</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }

  #canvas { display:block; width:100vw; height:100vh; touch-action:none; }

  /* HUD overlay */
  #hud {
    position:fixed; bottom:0; left:0; right:0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 12px 16px 20px;
    transition: opacity 0.4s;
  }
  #hud.hidden { opacity:0; pointer-events:none; }

  .row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }

  .chip {
    padding:6px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08); color:#fff; font-size:13px; cursor:pointer;
    transition:all 0.2s; white-space:nowrap; user-select:none; -webkit-user-select:none;
  }
  .chip.active { background:rgba(255,255,255,0.9); color:#000; border-color:transparent; }
  .chip:active { transform:scale(0.94); }

  #title {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font-size:11px; letter-spacing:3px;
    text-transform:uppercase; pointer-events:none;
    transition:opacity 0.4s;
  }
  #title.hidden { opacity:0; }

  #fps {
    position:fixed; top:16px; right:16px;
    color:rgba(255,255,255,0.35); font-size:10px;
    pointer-events:none;
  }

  .label { color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:1px; margin-right:4px; white-space:nowrap; }

  input[type=range] {
    -webkit-appearance:none; appearance:none;
    height:3px; border-radius:2px;
    background:rgba(255,255,255,0.2); outline:none; cursor:pointer;
    flex:1; min-width:80px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px;
    border-radius:50%; background:#fff; cursor:pointer;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="title">COLORSYNTH</div>
<div id="fps"></div>

<div id="hud">
  <div class="row">
    <span class="label">VARIATION</span>
    <div id="var-buttons"></div>
  </div>
  <div class="row">
    <span class="label">PALETTE</span>
    <div id="cmap-buttons"></div>
  </div>
  <div class="row">
    <span class="label">SPEED</span>
    <input type="range" id="speed" min="0.05" max="3.0" step="0.05" value="0.6">
    <span class="label" style="margin-left:6px">ZOOM</span>
    <input type="range" id="zoom" min="0.3" max="4.0" step="0.05" value="1.0">
  </div>
</div>

<script>
// ─── WebGL setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', {antialias:false, powerPreference:'high-performance'});
if (!gl) { document.body.innerHTML='<p style="color:white;padding:20px">WebGL not supported</p>'; }

// ─── Vertex shader (fullscreen quad) ─────────────────────────────────────────
const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

// ─── GLSL complex math helpers ────────────────────────────────────────────────
const COMPLEX_MATH = `
vec2 cmul(vec2 a, vec2 b) { return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }
vec2 cdiv(vec2 a, vec2 b) {
  float d = dot(b,b) + 1e-10;
  return vec2((a.x*b.x+a.y*b.y)/d, (a.y*b.x-a.x*b.y)/d);
}
vec2 cexp(vec2 z) { return vec2(cos(z.y), sin(z.y)) * exp(z.x); }
float cabs(vec2 z) { return length(z); }
float cangle(vec2 z) { return atan(z.y, z.x); }
vec2 cconj(vec2 z) { return vec2(z.x, -z.y); }
vec2 clog(vec2 z) { return vec2(log(length(z) + 1e-10), atan(z.y, z.x)); }
vec2 csin(vec2 z) {
  // cosh(y) = (e^y + e^-y)/2, sinh(y) = (e^y - e^-y)/2
  float ey = exp(z.y); float emy = exp(-z.y);
  return vec2(sin(z.x)*(ey+emy)*0.5, cos(z.x)*(ey-emy)*0.5);
}
vec2 ccos(vec2 z) {
  float ey = exp(z.y); float emy = exp(-z.y);
  return vec2(cos(z.x)*(ey+emy)*0.5, -sin(z.x)*(ey-emy)*0.5);
}
vec2 cpow(vec2 z, vec2 w) {
  float r = length(z) + 1e-10;
  float t = atan(z.y, z.x);
  return cexp(vec2(w.x*log(r) - w.y*t, w.x*t + w.y*log(r)));
}
`;

// ─── Variation shaders (Qwen-translated + LClAwRS-fixed) ─────────────────────
const VARIATIONS = {
  "Test": `
    // Guaranteed-working test: animated color gradient, no complex math
    vec2 variation(vec2 uv, float t) {
      return vec2(sin(uv.x + t), cos(uv.y + t * 0.7));
    }`,
  "Penrose": `
    // 5-fold quasicrystal — sum of 5 plane waves at 72° increments
    vec2 variation(vec2 uv, float t) {
      vec2 z = vec2(0.0);
      for (int k = 0; k < 5; k++) {
        float ang = 6.28318 * float(k) / 5.0;
        vec2 wave_dir = vec2(cos(ang), sin(ang));
        float phase = t + float(k) * 3.14159 * 0.4;
        float proj = dot(uv, wave_dir);   // correct: project uv onto wave direction
        z += cexp(vec2(0.0, proj * 4.0 + phase));
      }
      return z;
    }`,

  "Caustics": `
    // Ocean caustic light — 3 ripple sources interfering
    vec2 variation(vec2 uv, float t) {
      vec2 src1 = cexp(vec2(0.0, t)) * 0.5;
      vec2 src2 = cexp(vec2(0.0, t*1.13+1.0)) * 0.4;
      vec2 src3 = cexp(vec2(0.0, t*0.87+2.1)) * 0.3;
      float r1 = cabs(uv - src1) + 0.01;
      float r2 = cabs(uv + src2) + 0.01;
      vec2 zSIN = csin(uv);
      float r3 = cabs(zSIN*0.6 - src3) + 0.01;
      float c = sin(3.0/r1+t) * sin(3.0/r2-t*0.9) * sin(2.5/r3+t*1.1);
      c = tanh(c * 1.5);
      float phase = cangle(uv) + t*0.3;
      return cexp(vec2(0.0, phase)) * c;
    }`,

  "Aurora": `
    // Aurora borealis — horizontal curtains of drifting light
    vec2 variation(vec2 uv, float t) {
      float x = uv.x, y = uv.y;
      float b1 = sin(x*1.8 + sin(y*0.9 + t*0.6)*1.4 + t*0.4);
      float b2 = sin(x*2.3 + sin(y*1.1 - t*0.5)*1.1 + t*0.35);
      float b3 = sin(x*1.1 + sin(y*0.7 + t*0.45)*0.9 - t*0.3);
      float soft = (b1 + b2*0.7 + b3*0.5) / 2.2;
      float phase = y*0.6 + t*0.2;
      return cexp(vec2(0.0, phase)) * soft;
    }`,

  "Hex": `
    // Hexagonal lattice — three wave directions at 60°
    vec2 variation(vec2 uv, float t) {
      float k1 = uv.x * 2.5;
      float k2 = uv.x*1.25 + uv.y*2.165;
      float k3 = uv.x*1.25 - uv.y*2.165;
      float w = (sin(k1+t) + sin(k2+t*1.05) + sin(k3+t*0.97)) / 3.0;
      vec2 zSIN = csin(uv);
      float phase = atan(zSIN.y, zSIN.x)*0.3 + t*0.15;
      return vec2(w*cos(phase), w*sin(phase));
    }`,

  "p6m": `
    // Wallpaper group p6m — 6-fold rotation + mirror symmetry
    vec2 variation(vec2 uv, float t) {
      float x=uv.x, y=uv.y, sq3=1.7320508;
      float env = 0.7 + 0.3*sin(t*0.5);
      float mag  = (cos(x*3.0+t) + cos(x*1.5+y*sq3*1.5+t*1.03) + cos(x*1.5-y*sq3*1.5+t*0.97)) * env / 3.0;
      float imag = (sin(x*3.0+t+1.047) + sin(x*1.5+y*sq3*1.5+t*1.03+1.047) + sin(x*1.5-y*sq3*1.5+t*0.97+1.047)) * env / 3.0;
      return vec2(mag, imag);
    }`,

  "Escher": `
    // Escher logarithmic spiral — self-similar tiling
    vec2 variation(vec2 uv, float t) {
      float r = length(uv) + 0.05;
      float theta = atan(uv.y, uv.x);
      float lr = log(r);
      float u1 = lr*2.5 + theta*1.2 + t*0.4;
      float u2 = lr*1.8 - theta*0.9 + t*0.3;
      float mx = (sin(u1)+sin(u2))*0.5;
      float phase = lr*0.8 + theta + t*0.25;
      return cexp(vec2(0.0, phase)) * mx * (1.0 + 0.3*sin(t+lr));
    }`,

  "Bloom": `
    // Fourier radial harmonics — decaying modes bloom outward
    vec2 variation(vec2 uv, float t) {
      float r = length(uv) + 0.01;
      float theta = atan(uv.y, uv.x);
      float bloom = 0.0;
      for (int k=1; k<6; k++) {
        float fk = float(k);
        float amp = exp(-fk*0.4);
        float phase = fk*theta + fk*t*0.18 + fk*0.63;
        bloom += amp * sin(r*fk*2.0 + phase);
      }
      bloom /= 2.5;
      return cexp(vec2(0.0, theta*0.5+t*0.12)) * bloom;
    }`,

  "Tidal": `
    // Tidal — sin(z²)·sin(z) + z·cos(sin(z))
    vec2 variation(vec2 uv, float t) {
      vec2 zSIN = csin(uv);
      vec2 z2 = cmul(uv, uv);
      return cmul(csin(z2), zSIN) + cmul(uv, ccos(zSIN));
    }`,

  "Vortex": `
    // Vortex — recursive rotation through sin/cos space
    vec2 variation(vec2 uv, float t) {
      vec2 zSIN = csin(uv);
      vec2 z = (uv + zSIN) * 0.5;
      float dist = length(uv - zSIN);
      return cmul(cmul(z,z), cexp(vec2(0.0, dist)));
    }`,

  "Spiral": `
    // Spiral — z · exp(i·|sin(z)|)
    vec2 variation(vec2 uv, float t) {
      vec2 zSIN = csin(uv);
      return cmul(uv, cexp(vec2(0.0, length(zSIN))));
    }`,

  "Julia": `
    // Animated Julia set — rotating parameter
    vec2 variation(vec2 uv, float t) {
      float cx = 0.7885 * cos(t * 0.3);
      float cy = 0.7885 * sin(t * 0.3);
      vec2 z = uv * 0.5;
      vec2 c = vec2(cx, cy);
      // No break — some mobile GLSL ES 1.0 drivers reject dynamic loop exit
      for (int i=0; i<6; i++) {
        if (length(z) < 4.0) {
          z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
        }
      }
      return z;
    }`,

  "Möbius": `
    // Rotating Möbius transform
    vec2 variation(vec2 uv, float t) {
      vec2 a = cexp(vec2(0.0, t));
      vec2 b = vec2(cos(t), 0.0);
      vec2 c = vec2(sin(t), 0.0);
      vec2 d = cexp(vec2(0.0, t));
      return cdiv(cmul(a,uv) + b, cmul(c,uv) + d);
    }`,
};

// ─── Colormap functions ───────────────────────────────────────────────────────
const COLORMAPS = {
  "Psychedelic": `
    vec3 colormap(vec2 z) {
      float r = sin(z.x * 3.0);
      float g = sin(z.y * 3.0 + 2.1);
      float b = sin(length(z) * 3.0 + 4.2);
      return 0.5 + 0.5 * vec3(r, g, b);
    }`,
  "Aurora": `
    vec3 colormap(vec2 z) {
      float h = cangle(z) / 6.28318 + 0.5;
      float s = smoothstep(0.0, 2.0, length(z));
      // HSV→RGB (green/teal/blue aurora tones)
      vec3 c = vec3(h*0.4+0.4, 0.8+0.2*s, 0.6+0.4*s);
      float H=c.x*6.0; int i=int(H); float f=H-float(i);
      float p=c.z*(1.0-c.y), q=c.z*(1.0-c.y*f), t2=c.z*(1.0-c.y*(1.0-f));
      if(i==0) return vec3(c.z,t2,p);
      if(i==1) return vec3(q,c.z,p);
      if(i==2) return vec3(p,c.z,t2);
      if(i==3) return vec3(p,q,c.z);
      if(i==4) return vec3(t2,p,c.z);
      return vec3(c.z,p,q);
    }`,
  "Fire": `
    vec3 colormap(vec2 z) {
      float v = 0.5 + 0.5*sin(length(z)*2.5);
      float r = pow(v, 0.4);
      float g = pow(v, 1.5);
      float b = pow(v, 4.0);
      return vec3(r, g, b);
    }`,
  "Ocean": `
    vec3 colormap(vec2 z) {
      float v = 0.5 + 0.5*tanh(length(z)*0.8 - 0.5);
      float phase = cangle(z);
      return 0.5 + 0.5 * vec3(
        sin(phase + v*3.0),
        sin(phase + v*3.0 + 2.094),
        sin(phase + v*3.0 + 4.189)
      ) * vec3(0.3, 0.7, 1.0);
    }`,
  "Neon": `
    vec3 colormap(vec2 z) {
      float a = cangle(z) / 3.14159;
      float m = log(length(z)+1.0);
      float r = 0.5 + 0.5*sin(a*3.14159*2.0 + m*4.0);
      float g = 0.5 + 0.5*sin(a*3.14159*2.0 + m*4.0 + 2.094);
      float b = 0.5 + 0.5*sin(a*3.14159*2.0 + m*4.0 + 4.189);
      float brightness = 0.6 + 0.4 * sin(m*6.0);
      return vec3(r,g,b) * brightness;
    }`,
  "Dusk": `
    vec3 colormap(vec2 z) {
      float t = 0.5 + 0.5*sin(z.x*1.3 + z.y*0.7);
      vec3 a = vec3(0.8, 0.3, 0.7);
      vec3 b = vec3(0.2, 0.6, 0.9);
      vec3 c = vec3(0.5, 0.4, 0.3);
      vec3 d = vec3(0.0, 0.1, 0.8);
      return a + b*cos(6.28318*(c*t+d));
    }`,
};

// ─── Build fragment shader ────────────────────────────────────────────────────
function buildFS(varCode, cmapCode) {
  return `
precision highp float;
uniform float u_time;
uniform vec2  u_resolution;
uniform float u_zoom;

${COMPLEX_MATH}

// Variation
${varCode}

// Colormap (cangle/cabs available from COMPLEX_MATH above)
${cmapCode}

void main() {
  vec2 fc = gl_FragCoord.xy;
  // Center + zoom + aspect-correct mapping to [-2π, 2π]
  float aspect = u_resolution.x / u_resolution.y;
  vec2 uv = (fc / u_resolution - 0.5) * 12.566 / u_zoom;
  uv.x *= aspect;

  vec2 z = variation(uv, u_time);

  // Normalize z for coloring
  z = z / (1.0 + length(z) * 0.3);  // soft compress

  vec3 col = colormap(z);
  col = clamp(col, 0.0, 1.0);
  gl_FragColor = vec4(col, 1.0);
}
`;
}

// ─── Compile shader ───────────────────────────────────────────────────────────
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s), src);
    return null;
  }
  return s;
}

function buildProgram(varCode, cmapCode) {
  const vs = compile(gl.VERTEX_SHADER, VS);
  const fs = compile(gl.FRAGMENT_SHADER, buildFS(varCode, cmapCode));
  if (!vs || !fs) {
    // Show error on screen
    const err = fs ? '' : (gl.getShaderInfoLog(compile(gl.FRAGMENT_SHADER, buildFS(varCode, cmapCode))) || 'FS compile failed');
    console.error('Shader error:', err);
    showError('Shader error — try another variation\n' + err.slice(0,120));
    return null;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
    showError('Link error');
    return null;
  }
  hideError();
  return prog;
}

function showError(msg) {
  let el = document.getElementById('err');
  if (!el) {
    el = document.createElement('div');
    el.id = 'err';
    el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,0.7);color:#fff;padding:16px;border-radius:8px;font-size:12px;max-width:80vw;text-align:center;white-space:pre-wrap;z-index:999';
    document.body.appendChild(el);
  }
  el.textContent = msg;
}
function hideError() {
  const el = document.getElementById('err');
  if (el) el.remove();
}

// ─── Fullscreen quad ──────────────────────────────────────────────────────────
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

// ─── State ────────────────────────────────────────────────────────────────────
let currentVar  = Object.keys(VARIATIONS)[0];
let currentCmap = Object.keys(COLORMAPS)[0];
let program     = null;
let startTime   = performance.now() / 1000;
let lastFps     = performance.now();
let frameCount  = 0;
let speedMult   = 0.6;
let zoomVal     = 1.0;
let hudTimer    = null;

const fpsEl   = document.getElementById('fps');
const titleEl = document.getElementById('title');
const hudEl   = document.getElementById('hud');

function rebuild() {
  const prog = buildProgram(VARIATIONS[currentVar], COLORMAPS[currentCmap]);
  if (prog) { if (program) gl.deleteProgram(program); program = prog; }
}
rebuild();

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ─── Render loop ──────────────────────────────────────────────────────────────
function render(now) {
  requestAnimationFrame(render);
  const t = (now / 1000 - startTime) * speedMult;

  if (!program) return;
  gl.useProgram(program);

  const pos = gl.getAttribLocation(program, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  gl.uniform1f(gl.getUniformLocation(program, 'u_time'), t);
  gl.uniform2f(gl.getUniformLocation(program, 'u_resolution'), canvas.width, canvas.height);
  gl.uniform1f(gl.getUniformLocation(program, 'u_zoom'), zoomVal);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // FPS counter
  frameCount++;
  if (now - lastFps > 1000) {
    fpsEl.textContent = frameCount + ' fps';
    frameCount = 0; lastFps = now;
  }
}
requestAnimationFrame(render);

// ─── Build UI ─────────────────────────────────────────────────────────────────
function makeChips(containerId, items, current, onClick) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
  items.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (name === current ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      el.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onClick(name);
    });
    row.appendChild(btn);
  });
  el.appendChild(row);
}

makeChips('var-buttons', Object.keys(VARIATIONS), currentVar, name => {
  currentVar = name; rebuild(); showHud();
});
makeChips('cmap-buttons', Object.keys(COLORMAPS), currentCmap, name => {
  currentCmap = name; rebuild(); showHud();
});

document.getElementById('speed').addEventListener('input', e => {
  speedMult = parseFloat(e.target.value); showHud();
});
document.getElementById('zoom').addEventListener('input', e => {
  zoomVal = parseFloat(e.target.value); showHud();
});

// ─── HUD auto-hide ────────────────────────────────────────────────────────────
function showHud() {
  hudEl.classList.remove('hidden');
  titleEl.classList.remove('hidden');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => {
    hudEl.classList.add('hidden');
    titleEl.classList.add('hidden');
  }, 4000);
}

canvas.addEventListener('click', () => {
  if (hudEl.classList.contains('hidden')) showHud();
  else { hudEl.classList.add('hidden'); titleEl.classList.add('hidden'); clearTimeout(hudTimer); }
});

// Touch: pinch to zoom
let initDist = null;
let initZoom = 1.0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    initDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    initZoom = zoomVal;
  } else if (e.touches.length === 1) {
    showHud();
  }
}, {passive:true});

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && initDist) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoomVal = Math.max(0.3, Math.min(4.0, initZoom * d / initDist));
    document.getElementById('zoom').value = zoomVal;
  }
}, {passive:true});

canvas.addEventListener('touchend', () => { initDist = null; }, {passive:true});

// Show HUD initially, then auto-hide
showHud();
</script>
</body>
</html>
