<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ColorSynth Audio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>ColorSynth — Audio Reactive</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Courier New',monospace; }
@supports (-webkit-touch-callout:none) { html,body,#canvas { height:-webkit-fill-available; } }
#canvas { display:block; width:100vw; height:100vh; touch-action:none; }
#corner-tl, #corner-tr { position:fixed; color:rgba(255,255,255,0.4); font-size:10px; letter-spacing:1.5px; pointer-events:none; }
#corner-tl { top:16px; left:16px; }
#corner-tr { top:16px; right:16px; }
#corner-tl a { color:inherit; text-decoration:none; }
#toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.85);
  background:rgba(255,255,255,0.12); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  color:#fff; padding:12px 26px; border-radius:26px; font-size:14px; letter-spacing:1px;
  pointer-events:none; opacity:0; transition:opacity 0.25s, transform 0.25s;
  border:1px solid rgba(255,255,255,0.2); text-align:center;
}
#toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
#start-overlay {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
  background:rgba(0,0,0,0.82); z-index:50; transition:opacity 0.5s;
}
#start-overlay.gone { opacity:0; pointer-events:none; }
#start-btn {
  width:96px; height:96px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.5); background:rgba(255,255,255,0.08);
  color:#fff; font-size:36px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s, background 0.15s;
}
#start-btn:active { transform:scale(0.9); background:rgba(255,255,255,0.18); }
#start-label { color:rgba(255,255,255,0.65); font-size:12px; letter-spacing:3px; }
#start-sub   { color:rgba(255,255,255,0.35); font-size:10px; letter-spacing:2px; text-align:center; max-width:260px; line-height:1.8; }
#hud {
  position:fixed; bottom:0; left:0; right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
  padding:8px 16px 18px; transition:opacity 0.4s;
}
#hud.hidden { opacity:0; pointer-events:none; }
.hud-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
.hud-label { color:rgba(255,255,255,0.4); font-size:9px; letter-spacing:2px; min-width:52px; }
.chip {
  padding:6px 14px; border-radius:18px; border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.07); color:#fff; font-size:12px; cursor:pointer;
  letter-spacing:0.5px; transition:all 0.15s; -webkit-user-select:none;
  font-family:'Courier New',monospace;
}
.chip.active { background:rgba(255,255,255,0.88); color:#000; border-color:transparent; }
.chip:active { transform:scale(0.92); }
/* Spectrum visualizer canvas */
#spec-canvas {
  position:fixed; bottom:72px; left:0; right:0;
  height:48px; pointer-events:none; opacity:0;
  transition:opacity 0.5s;
}
#spec-canvas.show { opacity:1; }
input[type=range] {
  -webkit-appearance:none; appearance:none; flex:1;
  height:3px; border-radius:2px; background:rgba(255,255,255,0.2); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#fff; cursor:pointer;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<canvas id="spec-canvas"></canvas>
<div id="corner-tl"><a href="../">← HUB</a> · AUDIO REACTIVE</div>
<div id="corner-tr"></div>
<div id="toast"></div>

<div id="start-overlay">
  <button id="start-btn">🎤</button>
  <div id="start-label">TAP TO START</div>
  <div id="start-sub">Microphone access required.<br>ColorSynth reacts to sound in real time.<br>Works best with music.</div>
</div>

<div id="hud" class="hidden">
  <div class="hud-row">
    <span class="hud-label">VARIATION</span>
    <button class="chip active" data-var="0">Penrose</button>
    <button class="chip" data-var="1">Aurora</button>
    <button class="chip" data-var="2">Bloom</button>
    <button class="chip" data-var="3">Tidal</button>
    <button class="chip" data-var="4">Vortex</button>
  </div>
  <div class="hud-row">
    <span class="hud-label">SENS</span>
    <input type="range" id="sens-slider" min="0.5" max="6.0" step="0.1" value="2.5">
    <span class="hud-label" id="sens-val">2.5×</span>
    <span class="hud-label" style="margin-left:8px">BEAT</span>
    <input type="range" id="beat-slider" min="1.1" max="3.0" step="0.05" value="1.6">
    <span class="hud-label" id="beat-val">1.6×</span>
  </div>
</div>

<script>
// ── WebGL setup ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', {antialias:false, powerPreference:'high-performance'});
if (!gl) { document.body.innerHTML='<p style="color:white;padding:40px">WebGL not supported</p>'; }

const VS = `attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0.,1.);}`;

// ── Main fragment shader ───────────────────────────────────────────────────────
const FS = `
precision highp float;

uniform float u_time;
uniform vec2  u_res;
uniform float u_zoom;
uniform int   u_var;

// Scalar audio bands
uniform float u_bass;
uniform float u_mid;
uniform float u_high;
uniform float u_rms;     // overall loudness

// Beat physics uniforms
uniform float u_beat_age;     // seconds since last beat (0=just happened)
uniform float u_beat_power;   // 0-1, how strong the beat was
uniform float u_beat2_age;    // previous beat age (for double-pulse)
uniform float u_beat_bpm;     // estimated BPM (for color cycling)

// Spectrum texture: 128 bins packed into a 128x1 RGBA texture, R=value
uniform sampler2D u_spectrum;
uniform sampler2D u_waveform;  // 256-sample waveform, R=value

// ── Sample spectrum at normalized frequency 0-1 ───────────────────────────────
float spec(float f) {
  return texture2D(u_spectrum, vec2(f, 0.5)).r;
}
// Sample waveform at normalized position 0-1
float wave(float x) {
  return texture2D(u_waveform, vec2(x, 0.5)).r * 2.0 - 1.0;
}

// ── Complex helpers ───────────────────────────────────────────────────────────
vec2 cmul(vec2 a,vec2 b){return vec2(a.x*b.x-a.y*b.y,a.x*b.y+a.y*b.x);}
vec2 cexp(vec2 z){return exp(z.x)*vec2(cos(z.y),sin(z.y));}
vec2 csin(vec2 z){float ep=exp(z.y),em=exp(-z.y);return vec2(sin(z.x)*(ep+em)*.5,cos(z.x)*(ep-em)*.5);}
vec2 ccos(vec2 z){float ep=exp(z.y),em=exp(-z.y);return vec2(cos(z.x)*(ep+em)*.5,-sin(z.x)*(ep-em)*.5);}

// ── Beat shockwave ─────────────────────────────────────────────────────────────
// Returns displacement+brightness contribution from a beat event
// age = seconds since beat, power = 0-1 strength, uv = screen coords
float beatShockwave(float age, float power, vec2 uv) {
  if (age > 2.0) return 0.0;
  float radius  = age * 3.5;          // wave expands outward at 3.5 units/sec
  float dist    = length(uv);
  float ring    = exp(-pow(dist - radius, 2.0) * 18.0);   // tight Gaussian ring
  float decay   = exp(-age * 2.5);
  return ring * decay * power * 1.8;
}

// Phase displacement from shockwave (used to warp uv before variation)
vec2 beatWarp(float age, float power, vec2 uv) {
  if (age > 1.5) return vec2(0.0);
  float dist    = length(uv) + 0.001;
  float radius  = age * 3.5;
  float ring    = exp(-pow(dist - radius, 2.0) * 12.0);
  float decay   = exp(-age * 3.0);
  float warpAmt = ring * decay * power * 0.8;
  return normalize(uv) * warpAmt;  // radial push
}

// ── Spectrum warp — use FFT shape to distort uv ──────────────────────────────
vec2 specWarp(vec2 uv, float t) {
  float angle   = atan(uv.y, uv.x) / 6.28318 + 0.5; // 0-1
  float dist    = length(uv);
  // Read the spectrum bin corresponding to this angle
  float binVal  = spec(angle);
  // Read adjacent bins for spatial variance
  float binValL = spec(fract(angle - 0.05));
  float binValR = spec(fract(angle + 0.05));
  float gradient = (binValR - binValL) * 3.0;         // edge of spectrum shape
  // Radial warp proportional to loudness at this angle
  float radialShift = binVal * u_rms * 0.6;
  // Tangential warp from spectrum gradient
  vec2 tangent = vec2(-uv.y, uv.x) / (dist + 0.001);
  return uv * (1.0 + radialShift) + tangent * gradient * 0.3;
}

// ── Waveform ring — inject actual waveform shape into the field ────────────────
float waveformRing(vec2 uv, float t) {
  float angle   = atan(uv.y, uv.x) / 6.28318 + 0.5;
  float dist    = length(uv);
  float wSample = wave(angle);                       // -1..1 waveform sample
  float target  = 1.4 + wSample * u_rms * 1.2;      // radius of waveform ring
  float ring    = exp(-pow(dist - target, 2.0) * 8.0);
  return ring * (0.4 + u_rms * 0.6);
}

// ── Variations ────────────────────────────────────────────────────────────────

// 0: Penrose — spectrum zooms different angular wedges
vec2 var_penrose(vec2 uv, float t) {
  float scale = 1.0 + u_bass * 1.5;
  uv *= scale;
  vec2 z = vec2(0.);
  for (int k=0; k<5; k++) {
    float ang = 6.28318*float(k)/5.;
    vec2 d = vec2(cos(ang),sin(ang));
    // Each wave frequency modulated by corresponding spectrum bin
    float binFreq = spec(float(k)/5.0);
    float ph = t*(0.4 + binFreq*0.8 + u_mid*0.4) + float(k)*1.2566;
    float freq = 3.5 + binFreq*2.5;
    z += cexp(vec2(0., dot(uv,d)*freq + ph));
  }
  return z;
}

// 1: Aurora — waveform drives band undulation
vec2 var_aurora(vec2 uv, float t) {
  float x=uv.x, y=uv.y;
  // Sample waveform to modulate band positions
  float w1 = wave(fract(x*0.08+0.0));
  float w2 = wave(fract(x*0.08+0.33));
  float w3 = wave(fract(x*0.08+0.66));
  float bassAmp = 1.0 + u_bass*2.5;
  float b1=sin(x*1.8 + (w1*bassAmp + sin(y*.9+t*.6))*1.4 + t*.4);
  float b2=sin(x*2.3 + (w2*bassAmp + sin(y*1.1-t*.5))*1.1 + t*.35);
  float b3=sin(x*1.1 + (w3*bassAmp + sin(y*.7+t*.45))*.9  - t*.3);
  float s=(b1+b2*.7+b3*.5)/2.2;
  float ph=y*.6 + t*.2;
  return cexp(vec2(0.,ph))*s;
}

// 2: Bloom — each harmonic driven by its own spectrum bin
vec2 var_bloom(vec2 uv, float t) {
  float r=length(uv)+.01, th=atan(uv.y,uv.x), bl=0.;
  for (int k=1; k<7; k++) {
    float fk=float(k);
    float binVal = spec(fk/8.0);                   // each harmonic → its bin
    float amp = exp(-fk*0.35) * (1.0 + binVal*4.0);
    float ph  = fk*th + fk*t*(0.15+binVal*0.4) + fk*0.63;
    bl += amp*sin(r*fk*2.0 + ph);
  }
  bl /= 3.0;
  return cexp(vec2(0.,th*.5+t*.12))*bl;
}

// 3: Tidal — waveform directly ripples the field
vec2 var_tidal(vec2 uv, float t) {
  // Inject waveform as a spatial ripple
  float wSample = wave(fract(uv.x*0.1+0.5)) * u_rms;
  vec2 z2=cmul(uv,uv)+vec2(t*.4+u_bass*0.6, wSample*1.5);
  vec2 zs=csin(uv+vec2(sin(t*0.3+wSample)*.7, cos(t*0.25+u_mid)*.5));
  return cmul(csin(z2),zs)+cmul(uv,ccos(zs+vec2(t*.2,0.)));
}

// 4: Vortex — spectrum modulates angular speed per-zone
vec2 var_vortex(vec2 uv, float t) {
  float angle = atan(uv.y,uv.x);
  float binVal = spec(angle/6.28318+0.5);           // spectrum at this angle
  float spinRate = 0.25 + u_mid*0.4 + binVal*0.6;
  float ct=cos(t*spinRate), st=sin(t*spinRate);
  vec2 r=vec2(uv.x*ct-uv.y*st, uv.x*st+uv.y*ct);
  r *= (1.0 + u_bass*0.7 + binVal*0.5);
  vec2 zs=csin(r);
  vec2 z=(r+zs)*.5;
  float d=length(r-zs)+t*.1;
  return cmul(cmul(z,z),cexp(vec2(0.,d)));
}

// ── Colormap ─────────────────────────────────────────────────────────────────
vec3 colormap(vec2 z, float beatAge, float beatPow) {
  z = z/(1.+length(z)*.3);

  // BPM-driven hue shift — color cycles at the tempo
  float bpmCycle = u_time * u_beat_bpm / 60.0;
  float hueShift = bpmCycle * 0.15;

  float r = 0.5+0.5*sin(z.x*3.0 + hueShift);
  float g = 0.5+0.5*sin(z.y*3.0 + 2.094 + hueShift);
  float b = 0.5+0.5*sin(length(z)*3.0 + 4.189 + hueShift);
  vec3 col = vec3(r,g,b);

  // Frequency tinting: bass=warm, high=cool
  col = mix(col, col*vec3(1.5,0.85,0.6),  u_bass*0.5);
  col = mix(col, col*vec3(0.7,0.9,1.5),   u_high*0.4);

  // Beat flash: immediate white
  float flash = exp(-beatAge*8.0) * beatPow;
  col = mix(col, vec3(1.0), flash*0.6);

  // Beat afterglow: warm orange decay over ~1.5s
  float glow = exp(-beatAge*1.8) * beatPow * (1.0-flash);
  col = mix(col, col*vec3(1.6,1.1,0.5)+vec3(0.1,0.05,0.), glow*0.5);

  return clamp(col, 0., 1.);
}

// ── Main ──────────────────────────────────────────────────────────────────────
void main() {
  float asp = u_res.x/u_res.y;
  vec2 uv = (gl_FragCoord.xy/u_res - 0.5)*12.566/u_zoom;
  uv.x *= asp;

  // 1. Spectrum-driven spatial warp
  vec2 warpedUv = specWarp(uv, u_time);

  // 2. Beat shockwave radial warp
  vec2 beatWarpVec  = beatWarp(u_beat_age,  u_beat_power, uv);
  vec2 beatWarpVec2 = beatWarp(u_beat2_age, u_beat_power*0.5, uv);
  warpedUv += beatWarpVec + beatWarpVec2;

  // 3. Variation on warped coords
  vec2 z;
  if      (u_var==0) z=var_penrose(warpedUv, u_time);
  else if (u_var==1) z=var_aurora(warpedUv, u_time);
  else if (u_var==2) z=var_bloom(warpedUv, u_time);
  else if (u_var==3) z=var_tidal(warpedUv, u_time);
  else               z=var_vortex(warpedUv, u_time);

  // 4. Color
  vec3 col = colormap(z, u_beat_age, u_beat_power);

  // 5. Waveform ring overlay — actual waveform shape visible in the image
  float ring = waveformRing(uv, u_time);
  col = mix(col, vec3(1.0), ring * 0.55);

  // 6. Beat shockwave brightness ring
  float shock1 = beatShockwave(u_beat_age,  u_beat_power, uv);
  float shock2 = beatShockwave(u_beat2_age, u_beat_power*0.4, uv);
  col += vec3(shock1*0.9, shock1*0.5, shock1*0.2);   // warm shockwave
  col += vec3(shock2*0.4, shock2*0.4, shock2*0.7);   // cooler second ring
  col  = clamp(col, 0., 1.);

  // 7. Vignette
  float vig = 1.0 - dot((uv/12.566)*0.8, (uv/12.566)*0.8);
  col *= clamp(vig, 0.3, 1.0);

  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Compile shader ────────────────────────────────────────────────────────────
function sh(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const posAttr = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(posAttr);
gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const U = {};
['u_time','u_res','u_zoom','u_var','u_bass','u_mid','u_high','u_rms',
 'u_beat_age','u_beat_power','u_beat2_age','u_beat_bpm',
 'u_spectrum','u_waveform'].forEach(n => U[n] = gl.getUniformLocation(prog, n));

// ── Spectrum texture (128×1 LUMINANCE) ────────────────────────────────────────
const specTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, specTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// ── Waveform texture (256×1 LUMINANCE) ────────────────────────────────────────
const waveTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE1);
gl.bindTexture(gl.TEXTURE_2D, waveTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
// Initialise with flat waveform
gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 256, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, new Uint8Array(256).fill(128));

// ── State ─────────────────────────────────────────────────────────────────────
let bass=0, mid=0, high=0, rms=0;
let varIdx=0, zoom=1.0;
let sensitivity=2.5, beatThreshold=1.6;

// Beat physics
let beatAge  = 99.0, beatPow  = 0.0;
let beat2Age = 99.0;
let beatBpm  = 120.0;
let lastBeatTime = 0, prevBeatTime = 0;

// Energy history for beat detection (separate bass history)
const HISTORY = 43;
const bassHist = new Float32Array(HISTORY);
let histIdx = 0;

let audioCtx=null, analyser=null, waveAnalyser=null;
let freqData=null, waveData=null;
let hudTimer=null;

const fpsEl   = document.getElementById('corner-tr');
const toastEl = document.getElementById('toast');
const specCvs = document.getElementById('spec-canvas');
const specCtx = specCvs.getContext('2d');
const hudEl   = document.getElementById('hud');
const sensSlider  = document.getElementById('sens-slider');
const beatSlider  = document.getElementById('beat-slider');
const sensValEl   = document.getElementById('sens-val');
const beatValEl   = document.getElementById('beat-val');
let frameCount=0, lastFps=performance.now();
let toastTimer;

function toast(msg) {
  toastEl.textContent=msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1500);
}
function showHud() {
  hudEl.classList.remove('hidden');
  clearTimeout(hudTimer);
  hudTimer=setTimeout(()=>hudEl.classList.add('hidden'),5000);
}

function resize() {
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width =window.innerWidth*dpr;  canvas.height=window.innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
  specCvs.width=window.innerWidth; specCvs.height=48;
}
window.addEventListener('resize',resize); resize();

// ── Audio start ───────────────────────────────────────────────────────────────
async function startAudio() {
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const src = audioCtx.createMediaStreamSource(stream);

    // FFT analyser — 256 bins for spectrum texture
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.75;
    freqData = new Uint8Array(analyser.frequencyBinCount); // 256

    // Time-domain analyser — waveform texture
    waveAnalyser = audioCtx.createAnalyser();
    waveAnalyser.fftSize = 512;
    waveAnalyser.smoothingTimeConstant = 0.3;
    waveData = new Uint8Array(256);

    src.connect(analyser);
    src.connect(waveAnalyser);

    document.getElementById('start-overlay').classList.add('gone');
    setTimeout(()=>document.getElementById('start-overlay').style.display='none',600);
    specCvs.classList.add('show');
    showHud();
    toast('🎤 Listening');
  } catch(e) {
    toast('Mic denied — tap to retry');
    console.error(e);
  }
}
document.getElementById('start-btn').addEventListener('click', startAudio);

// ── Audio analysis ────────────────────────────────────────────────────────────
function analyzeAudio(nowMs) {
  if (!analyser) return;

  analyser.getByteFrequencyData(freqData);
  waveAnalyser.getByteTimeDomainData(waveData);

  const bins = freqData.length; // 256
  // Band ranges (256 bins, ~86Hz/bin at 44.1kHz)
  // bass: 0-12 (~0-1kHz), mid: 12-60 (~1-5kHz), high: 60-256
  let bSum=0,mSum=0,hSum=0;
  for(let i=0;i<12;i++)   bSum+=freqData[i];
  for(let i=12;i<60;i++)  mSum+=freqData[i];
  for(let i=60;i<bins;i++) hSum+=freqData[i];
  const s=sensitivity;
  const rawBass = (bSum/12/255)*s;
  const rawMid  = (mSum/48/255)*s*0.75;
  const rawHigh = (hSum/196/255)*s*0.5;

  // RMS overall loudness
  let sq=0; waveData.forEach(v=>{ const n=(v/128)-1; sq+=n*n; });
  rms = Math.min(1.0, Math.sqrt(sq/256)*s*1.2);

  // Smooth
  bass = rawBass*0.35 + bass*0.65;
  mid  = rawMid*0.35  + mid*0.65;
  high = rawHigh*0.35 + high*0.65;

  // Beat detection — energy vs rolling average
  const instantBass = bSum/12/255;
  bassHist[histIdx%HISTORY]=instantBass; histIdx++;
  let avg=0; for(let i=0;i<HISTORY;i++) avg+=bassHist[i]; avg/=HISTORY;
  const ratio = instantBass / (avg+0.001);
  const nowSec = nowMs/1000;

  if (ratio > beatThreshold && instantBass > 0.08 && nowMs-lastBeatTime > 200) {
    beat2Age = beatAge;           // shift current beat to "previous"
    beatAge  = 0.0;
    beatPow  = Math.min(1.0, (ratio-1.0)*0.7 + 0.4);
    // BPM estimation from interval
    if (lastBeatTime > 0) {
      const interval = nowMs - lastBeatTime;
      if (interval > 200 && interval < 2000) {
        beatBpm = beatBpm*0.8 + (60000/interval)*0.2;  // smoothed BPM
      }
    }
    prevBeatTime = lastBeatTime;
    lastBeatTime = nowMs;
  }

  // Upload spectrum texture (256→128 downsampled)
  const specArr = new Uint8Array(128);
  for(let i=0;i<128;i++) specArr[i]=freqData[i*2];
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, specTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,128,1,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,specArr);

  // Upload waveform texture
  const waveArr=new Uint8Array(256);
  for(let i=0;i<256;i++) waveArr[i]=waveData[i];
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,waveTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,256,1,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,waveArr);

  drawSpectrum();
}

// ── 2D spectrum visualizer ────────────────────────────────────────────────────
function drawSpectrum() {
  if (!freqData) return;
  const W=specCvs.width, H=specCvs.height;
  specCtx.clearRect(0,0,W,H);
  const barW = W/128;
  for(let i=0;i<128;i++) {
    const v = freqData[i*2]/255;
    const h = v*H;
    const hue = i*2.8;
    const alpha = 0.5+v*0.5;
    specCtx.fillStyle=`hsla(${hue},90%,${40+v*35}%,${alpha})`;
    specCtx.fillRect(i*barW, H-h, barW-1, h);
  }
  // Waveform line overlay
  if (!waveData) return;
  specCtx.strokeStyle='rgba(255,255,255,0.4)';
  specCtx.lineWidth=1.5;
  specCtx.beginPath();
  for(let i=0;i<256;i++) {
    const x=i/255*W;
    const y=H/2 - (waveData[i]/128-1)*H*0.45;
    i===0 ? specCtx.moveTo(x,y) : specCtx.lineTo(x,y);
  }
  specCtx.stroke();
}

// ── Render loop ───────────────────────────────────────────────────────────────
function render(now) {
  requestAnimationFrame(render);
  const dt = 1/60;  // approximate frame delta
  if (beatAge < 99)  beatAge  += dt;
  if (beat2Age < 99) beat2Age += dt;

  analyzeAudio(now);

  gl.uniform1f(U.u_time, now/1000);
  gl.uniform2f(U.u_res, canvas.width, canvas.height);
  gl.uniform1f(U.u_zoom, zoom);
  gl.uniform1i(U.u_var, varIdx);
  gl.uniform1f(U.u_bass, Math.min(1,bass));
  gl.uniform1f(U.u_mid,  Math.min(1,mid));
  gl.uniform1f(U.u_high, Math.min(1,high));
  gl.uniform1f(U.u_rms,  rms);
  gl.uniform1f(U.u_beat_age,   Math.min(beatAge,  10.0));
  gl.uniform1f(U.u_beat_power, beatPow);
  gl.uniform1f(U.u_beat2_age,  Math.min(beat2Age, 10.0));
  gl.uniform1f(U.u_beat_bpm,   beatBpm);
  gl.uniform1i(U.u_spectrum,   0);
  gl.uniform1i(U.u_waveform,   1);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  frameCount++;
  if(now-lastFps>1000){ fpsEl.textContent=frameCount+' fps'; frameCount=0; lastFps=now; }
}
requestAnimationFrame(render);

// ── Controls ──────────────────────────────────────────────────────────────────
const VAR_NAMES=['Penrose','Aurora','Bloom','Tidal','Vortex'];
document.querySelectorAll('.chip[data-var]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    varIdx=parseInt(btn.dataset.var);
    document.querySelectorAll('.chip[data-var]').forEach((b,i)=>b.classList.toggle('active',i===varIdx));
    toast(VAR_NAMES[varIdx]); showHud();
  });
});

sensSlider.addEventListener('input',()=>{
  sensitivity=parseFloat(sensSlider.value);
  sensValEl.textContent=sensitivity.toFixed(1)+'×';
  showHud();
});
beatSlider.addEventListener('input',()=>{
  beatThreshold=parseFloat(beatSlider.value);
  beatValEl.textContent=beatThreshold.toFixed(2)+'×';
  showHud();
});

canvas.addEventListener('click', showHud);

// Pinch zoom
let initDist=null, initZoom=1;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){initDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);initZoom=zoom;}
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&initDist){const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);zoom=Math.max(0.3,Math.min(4,initZoom*d/initDist));}
},{passive:true});
canvas.addEventListener('touchend',e=>{if(e.touches.length<2)initDist=null;},{passive:true});
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.3,Math.min(4,zoom*(e.deltaY<0?1.12:0.89)));},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){varIdx=(varIdx+1)%5;document.querySelectorAll('.chip[data-var]').forEach((b,i)=>b.classList.toggle('active',i===varIdx));toast(VAR_NAMES[varIdx]);}
  if(e.key==='+'||e.key==='=')zoom=Math.min(4,zoom*1.15);
  if(e.key==='-')zoom=Math.max(0.3,zoom/1.15);
});
</script>
